name: Mini Scan Alert - India Stocks

on:
  schedule:
    # 3:00 PM IST = 09:30 AM UTC, Daily
    - cron: '30 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./api
        run: npm install

      - name: Run India Stock Mini Scan Alert
        working-directory: ./api
        env:
          PW_NOTIFY_KEY: ${{ secrets.PW_NOTIFY_KEY }}
          CHARTINK_SCAN_LINK: scanlink:bc07d725c8bc8b366132a7a19b3d84fb
          CHARTINK_SCREENER_URL: https://chartink.com/screener/down-by-50-with-moment
        run: node miniScanAlert-india.js

      - name: Persist data JSON changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/data/*.json
          if git diff --cached --quiet; then
            echo "No data changes to persist"
            exit 0
          fi
          git commit -m "chore(data): persist India mini scan outputs"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload scan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: india-scan-logs
          path: api/logs/
          retention-days: 7
