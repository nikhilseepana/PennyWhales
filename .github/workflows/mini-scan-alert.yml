name: Mini Scan Alert

on:
  schedule:
    # 10:30 PM IST = 05:00 PM UTC, weekdays only
    - cron: '0 17 * * 1-5'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'api/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./api
        run: npm install
      
      - name: Run Mini Scan Alert
        working-directory: ./api
        env:
          PW_NOTIFY_KEY: ${{ secrets.PW_NOTIFY_KEY }}
        run: node miniScanAlert.js

      - name: Persist data JSON changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/data/*.json
          if git diff --cached --quiet; then
            echo "No data changes to persist"
            exit 0
          fi
          git commit -m "chore(data): persist US mini scan outputs"
          git push origin HEAD:${{ github.ref_name }}
      
      - name: Log execution
        if: always()
        run: echo "Mini scan alert completed at $(date)"
