name: Mini Scan Alert

on:
  schedule:
    # Run at 9:30 AM ET (13:30 UTC) on weekdays - NASDAQ Open
    - cron: '30 13 * * 1-5'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'api/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./api
        run: npm install
      
      - name: Run Mini Scan Alert
        working-directory: ./api
        env:
          PW_NOTIFY_KEY: ${{ secrets.PW_NOTIFY_KEY }}
        run: node miniScanAlert.js
      
      - name: Log execution
        if: always()
        run: echo "Mini scan alert completed at $(date)"
